theme: jekyll-theme-chirpy

lang: en
timezone: Europe/Paris

title: Inas Salkanovic
tagline: Network Security · Pentesting · Infrastructure
description: HTB writeups, homelab projects and security research
url: "https://lunkan387.github.io"

github:
  username: Lunkan387

social:
  name: Inas Salkanovic
  email: inassalkanovic40@gmail.com
  links:
    - https://github.com/Lunkan387
    - https://www.linkedin.com/in/inas-salkanovic-3b46a6303

avatar:
theme_mode:
toc: true
comments:
  provider:

paginate: 10
baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
